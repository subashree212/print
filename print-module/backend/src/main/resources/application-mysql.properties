# ─────────────────────────────────────────
# application-mysql.properties
# Use this for production with MySQL.
# Run with: java -jar app.jar --spring.profiles.active=mysql
# ─────────────────────────────────────────

spring.datasource.url=jdbc:mysql://localhost:3306/printdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD_HERE

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
